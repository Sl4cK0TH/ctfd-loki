{% extends "admin/challenges/create.html" %}

{% block value %}
<div class="form-group">
  <label>
    Value<br>
    <small class="form-text text-muted">Base points for this challenge.</small>
  </label>
  <input type="number" class="form-control" name="value" value="100" required>
</div>

<hr>
<h5>Container Settings</h5>

<div class="form-group">
  <label>
    Docker Image<br>
    <small class="form-text text-muted">Must exist on the Docker daemon used by CTFd.</small>
  </label>
  <input type="text" class="form-control" name="docker_image" placeholder="e.g. rsuctf/grade-grabber:loki" required>
</div>

<div class="form-group">
  <label>Internal Port</label>
  <input type="number" class="form-control" name="redirect_port" value="22" required>
</div>

<div class="form-group">
  <label>Connection Type</label>
  <select class="form-control custom-select" name="redirect_type">
    <option value="ssh">SSH</option>
    <option value="tcp">TCP / Netcat</option>
    <option value="http">HTTP</option>
  </select>
</div>

<div class="form-group">
  <label>SSH Username</label>
  <input type="text" class="form-control" name="ssh_user" value="ctf">
</div>

<div class="form-group">
  <label>Memory Limit</label>
  <input type="text" class="form-control" name="memory_limit" value="256m" placeholder="e.g. 256m, 1g">
</div>

<div class="form-group">
  <label>CPU Limit</label>
  <input type="number" class="form-control" name="cpu_limit" value="0.5" step="0.1" min="0.1" max="4.0">
</div>

<hr>
<h5>Flag Settings</h5>

<div class="form-group">
  <label>Flag Mode</label>
  <select class="form-control custom-select" id="flag_mode" name="flag_mode">
    <option value="static" selected>Static (admin-defined)</option>
    <option value="dynamic">Dynamic (per instance)</option>
  </select>
  <small class="form-text text-muted">Static flags are configured in the Flags tab after creation.</small>
</div>

<div class="form-group" id="flag-template-group" style="display:none;">
  <label>
    Flag Template (Jinja2)<br>
    <small class="form-text text-muted">Available: <code>container</code>, <code>uuid</code>, <code>random</code></small>
  </label>
  <input type="text" class="form-control" name="flag_template" value='flag{% raw %}{{ uuid.uuid4()|string }}{% endraw %}'>
</div>

<hr>
<h5>Scoring</h5>

<div class="form-group">
  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="dynamic_score" name="dynamic_score" value="1">
    <label class="form-check-label" for="dynamic_score">Enable dynamic score recalculation on solve</label>
  </div>
</div>
{% endblock %}

{% block type %}
<input type="hidden" value="loki" name="type" id="chaltype">
{% endblock %}
