{% extends "admin/challenges/update.html" %}

{% block value %}
<div class="form-group">
  <label>
    Value<br>
    <small class="form-text text-muted">Base points for this challenge.</small>
  </label>
  <input type="number" class="form-control chal-value" name="value" value="{{ challenge.value }}" required>
</div>

<hr>
<h5>Container Settings</h5>

<div class="form-group">
  <label>
    Docker Image<br>
    <small class="form-text text-muted">Must exist on the Docker daemon used by CTFd.</small>
  </label>
  <input type="text" class="form-control" name="docker_image" value="{{ challenge.docker_image }}" required>
</div>

<div class="form-group">
  <label>Internal Port</label>
  <input type="number" class="form-control" name="redirect_port" value="{{ challenge.redirect_port }}" required>
</div>

<div class="form-group">
  <label>Connection Type</label>
  <select class="form-control custom-select" name="redirect_type">
    <option value="ssh" {% if challenge.redirect_type == "ssh" %}selected{% endif %}>SSH</option>
    <option value="tcp" {% if challenge.redirect_type == "tcp" %}selected{% endif %}>TCP / Netcat</option>
    <option value="http" {% if challenge.redirect_type == "http" %}selected{% endif %}>HTTP</option>
  </select>
</div>

<div class="form-group">
  <label>TCP Display Format</label>
  <select class="form-control custom-select" name="tcp_display_template">
    <option value="" {% if not challenge.tcp_display_template %}selected{% endif %}>Use default (Loki settings)</option>
    <option value="nc" {% if challenge.tcp_display_template == "nc" %}selected{% endif %}>Netcat (nc host port)</option>
    <option value="htb" {% if challenge.tcp_display_template == "htb" %}selected{% endif %}>HTB (host:port)</option>
  </select>
</div>

<div class="form-group">
  <label>SSH Username</label>
  <input type="text" class="form-control" name="ssh_user" value="{{ challenge.ssh_user }}">
</div>

<div class="form-group">
  <label>Memory Limit</label>
  <input type="text" class="form-control" name="memory_limit" value="{{ challenge.memory_limit }}">
</div>

<div class="form-group">
  <label>CPU Limit</label>
  <input type="number" class="form-control" name="cpu_limit" value="{{ challenge.cpu_limit }}" step="0.1" min="0.1" max="4.0">
</div>

<hr>
<h5>Flag Settings</h5>

<div class="form-group">
  <label>Flag Mode</label>
  <select class="form-control custom-select" id="flag_mode" name="flag_mode">
    <option value="static" {% if challenge.flag_mode == "static" %}selected{% endif %}>Static (admin-defined)</option>
    <option value="dynamic" {% if challenge.flag_mode == "dynamic" %}selected{% endif %}>Dynamic (per instance)</option>
  </select>
</div>

<div class="form-group" id="flag-template-group">
  <label>
    Flag Template (Jinja2)<br>
    <small class="form-text text-muted">Available: <code>container</code>, <code>uuid</code>, <code>random</code></small>
  </label>
  <input type="text" class="form-control" name="flag_template" value="{{ challenge.flag_template }}">
</div>

<hr>
<h5>Scoring</h5>

<div class="form-group">
  <div class="form-check">
    <input class="form-check-input" type="checkbox" id="dynamic_score" name="dynamic_score" value="1" {% if challenge.dynamic_score %}checked{% endif %}>
    <label class="form-check-label" for="dynamic_score">Enable dynamic score recalculation on solve</label>
  </div>
</div>
{% endblock %}
