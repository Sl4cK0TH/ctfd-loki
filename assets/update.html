<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h5 class="modal-title">Update Loki Challenge</h5>
      <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
    </div>
    <div class="modal-body">

      <!-- ── Standard CTFd Fields ──────────────────────────── -->
      <div class="mb-3">
        <label class="form-label" for="name">Name</label>
        <input type="text" class="form-control" id="name" name="name">
      </div>
      <div class="mb-3">
        <label class="form-label" for="category">Category</label>
        <input type="text" class="form-control" id="category" name="category">
      </div>
      <div class="mb-3">
        <label class="form-label" for="description">Description</label>
        <textarea class="form-control" id="description" name="description" rows="5"></textarea>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label" for="value">Points</label>
          <input type="number" class="form-control" id="value" name="value">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label" for="state">State</label>
          <select class="form-select" id="state" name="state">
            <option value="visible">Visible</option>
            <option value="hidden">Hidden</option>
          </select>
        </div>
      </div>

      <!-- ── Container Settings ────────────────────────────── -->
      <hr>
      <h6><i class="fas fa-docker me-1"></i> Container Settings</h6>

      <div class="mb-3">
        <label class="form-label" for="docker_image">Docker Image</label>
        <input type="text" class="form-control" id="docker_image" name="docker_image">
      </div>

      <div class="row">
        <div class="col-md-4 mb-3">
          <label class="form-label" for="redirect_port">Internal Port</label>
          <input type="number" class="form-control" id="redirect_port" name="redirect_port">
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label" for="redirect_type">Connection Type</label>
          <select class="form-select" id="redirect_type" name="redirect_type">
            <option value="ssh">SSH</option>
            <option value="tcp">TCP / Netcat</option>
            <option value="http">HTTP</option>
          </select>
        </div>
        <div class="col-md-4 mb-3">
          <label class="form-label" for="ssh_user">SSH Username</label>
          <input type="text" class="form-control" id="ssh_user" name="ssh_user">
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label" for="memory_limit">Memory Limit</label>
          <input type="text" class="form-control" id="memory_limit" name="memory_limit">
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label" for="cpu_limit">CPU Limit</label>
          <input type="number" class="form-control" id="cpu_limit" name="cpu_limit" step="0.1">
        </div>
      </div>

      <!-- ── Flag Settings ─────────────────────────────────── -->
      <hr>
      <h6><i class="fas fa-flag me-1"></i> Flag Settings</h6>

      <div class="mb-3">
        <label class="form-label" for="flag_mode">Flag Mode</label>
        <select class="form-select" id="flag_mode" name="flag_mode" onchange="toggleFlagTemplate()">
          <option value="static">Static</option>
          <option value="dynamic">Dynamic</option>
        </select>
      </div>

      <div class="mb-3" id="flag-template-group">
        <label class="form-label" for="flag_template">Flag Template (Jinja2)</label>
        <input type="text" class="form-control font-monospace" id="flag_template" name="flag_template">
      </div>

      <!-- ── Scoring ───────────────────────────────────────── -->
      <hr>
      <h6><i class="fas fa-chart-line me-1"></i> Scoring</h6>

      <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="dynamic_score" name="dynamic_score" value="1">
        <label class="form-check-label" for="dynamic_score">Enable dynamic scoring</label>
      </div>

    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      <button type="submit" class="btn btn-primary">Update</button>
    </div>
  </div>
</div>

<script>
function toggleFlagTemplate() {
  var mode = document.getElementById('flag_mode').value;
  document.getElementById('flag-template-group').style.display = mode === 'dynamic' ? '' : 'none';
}
</script>
